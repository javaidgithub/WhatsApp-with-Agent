<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WhatsApp Live Feed</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0e0d;
    --surface: #111714;
    --border: #1e2b24;
    --group-accent: #25d366;
    --channel-accent: #00b4d8;
    --group-dim: rgba(37,211,102,0.08);
    --channel-dim: rgba(0,180,216,0.08);
    --text: #e8f5e9;
    --muted: #556b5d;
    --tag-r: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    padding: 20px 28px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo {
    width: 36px; height: 36px;
    background: var(--group-accent);
    border-radius: 50%;
    display: grid; place-items: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.15rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    color: var(--group-accent);
  }

  header p {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .status-dot {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.7rem;
    color: var(--muted);
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #333;
    transition: background 0.3s;
  }
  .dot.live { background: var(--group-accent); animation: pulse 2s infinite; }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(37,211,102,0.4); }
    50%      { box-shadow: 0 0 0 5px rgba(37,211,102,0); }
  }

  /* ── Stats bar ── */
  .stats {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .stat {
    flex: 1;
    padding: 10px 20px;
    font-size: 0.68rem;
    color: var(--muted);
    border-right: 1px solid var(--border);
    text-align: center;
  }
  .stat:last-child { border-right: none; }
  .stat strong {
    display: block;
    font-size: 1.2rem;
    font-weight: 600;
    font-family: 'Syne', sans-serif;
  }
  .stat.g strong { color: var(--group-accent); }
  .stat.c strong { color: var(--channel-accent); }
  .stat.t strong { color: var(--text); }

  /* ── Feed ── */
  #feed {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .msg-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    animation: slideIn 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-card.group {
    background: var(--group-dim);
    border-color: rgba(37,211,102,0.2);
  }
  .msg-card.channel {
    background: var(--channel-dim);
    border-color: rgba(0,180,216,0.2);
  }

  .msg-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .msg-card.group::before  { background: var(--group-accent); }
  .msg-card.channel::before { background: var(--channel-accent); }

  .msg-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 2px 7px;
    border-radius: var(--tag-r);
    text-transform: uppercase;
  }
  .tag.group   { background: rgba(37,211,102,0.18); color: var(--group-accent); }
  .tag.channel { background: rgba(0,180,216,0.18);  color: var(--channel-accent); }

  .msg-name {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--text);
  }

  .msg-sender {
    font-size: 0.65rem;
    color: var(--muted);
  }

  .msg-time {
    margin-left: auto;
    font-size: 0.6rem;
    color: var(--muted);
  }

  .msg-body {
    font-size: 0.8rem;
    line-height: 1.55;
    color: #c8dfc8;
    word-break: break-word;
  }

  /* ── Empty state ── */
  #empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    gap: 10px;
    padding: 60px 20px;
  }
  #empty .icon { font-size: 2.5rem; }
  #empty p { font-size: 0.75rem; text-align: center; max-width: 260px; line-height: 1.6; }

  /* ── Scrollbar ── */
  #feed::-webkit-scrollbar { width: 4px; }
  #feed::-webkit-scrollbar-track { background: transparent; }
  #feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="logo">💬</div>
  <div>
    <h1>WA Live Feed</h1>
    <p>Redis-queued • real-time stream</p>
  </div>
  <div class="status-dot">
    <div class="dot" id="dot"></div>
    <span id="status-label">connecting…</span>
  </div>
</header>

<div class="stats">
  <div class="stat g"><strong id="cnt-group">0</strong>Groups</div>
  <div class="stat c"><strong id="cnt-channel">0</strong>Channels</div>
  <div class="stat t"><strong id="cnt-total">0</strong>Total</div>
</div>

<div id="feed">
  <div id="empty">
    <span class="icon">📡</span>
    <p>Waiting for messages from GroupMessages.js and ChannelMessages.js…</p>
  </div>
</div>

<script>
  const STREAM_URL = 'http://localhost:8000/stream';

  let cntGroup = 0, cntChannel = 0;
  const feed = document.getElementById('feed');
  const empty = document.getElementById('empty');
  const dot = document.getElementById('dot');
  const statusLabel = document.getElementById('status-label');

  function formatTime(ts) {
    const d = ts ? new Date(ts * 1000) : new Date();
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function addMessage(data) {
    empty.style.display = 'none';

    const isGroup = data.source === 'group';
    isGroup ? cntGroup++ : cntChannel++;
    const total = cntGroup + cntChannel;

    document.getElementById('cnt-group').textContent = cntGroup;
    document.getElementById('cnt-channel').textContent = cntChannel;
    document.getElementById('cnt-total').textContent = total;

    const card = document.createElement('div');
    card.className = `msg-card ${isGroup ? 'group' : 'channel'}`;

    const name   = isGroup ? (data.group_name || 'Unknown Group') : (data.channel_name || 'Channel');
    const sender = isGroup ? (data.sender || '') : '';

    card.innerHTML = `
      <div class="msg-meta">
        <span class="tag ${isGroup ? 'group' : 'channel'}">${isGroup ? 'group' : 'channel'}</span>
        <span class="msg-name">${escHtml(name)}</span>
        ${sender ? `<span class="msg-sender">· ${escHtml(sender)}</span>` : ''}
        <span class="msg-time">${formatTime(data.timestamp)}</span>
      </div>
      <div class="msg-body">${escHtml(data.message || '')}</div>
    `;

    // Prepend so newest is on top
    feed.insertBefore(card, feed.firstChild);
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function connect() {
    const es = new EventSource(STREAM_URL);

    es.onopen = () => {
      dot.classList.add('live');
      statusLabel.textContent = 'live';
    };

    es.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.type === 'connected') return;
        addMessage(data);
      } catch (_) {}
    };

    es.onerror = () => {
      dot.classList.remove('live');
      statusLabel.textContent = 'reconnecting…';
      es.close();
      setTimeout(connect, 3000);
    };
  }

  connect();
</script>
</body>
</html>
